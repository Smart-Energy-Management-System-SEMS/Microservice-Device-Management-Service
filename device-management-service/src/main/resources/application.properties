spring.application.name=device-management-service
server.port=${PORT:8081}

# =============================================
# DATABASE - Supabase PostgreSQL
# =============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sems_devices}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT - mismo secret que el monolito IAM
# =============================================
authorization.jwt.secret=${JWT_SECRET:SEMSSecretKeyForJWTTokenGenerationAndValidation2025}
authorization.jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
# SWAGGER / OpenAPI
# =============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =============================================
# CORS
# =============================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
